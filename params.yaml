TrainingArguments:
  epochs: 3         # Must be 100+ to get mAP50 > 0 on this dataset
  image_size: 416      # Smaller = faster on CPU; notebook used 320
  batch_size: 8        # Lower than 16 avoids OOM on CPU
  lr0: 0.01
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3.0
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1
  box: 7.5
  cls: 0.5
  dfl: 1.5
  conf_threshold: 0.25
  iou_threshold: 0.45
  optimizer: SGD
  seed: 42
  deterministic: true
  workers: 0           # 0 = no multiprocessing (avoids Windows errors)
  device: cpu
  pretrained: true
  augment: true
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.5
  shear: 0.0
  flipud: 0.0
  fliplr: 0.5
  mosaic: 1.0
  mixup: 0.0
  cache: false
