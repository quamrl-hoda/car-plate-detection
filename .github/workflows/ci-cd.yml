# # ══════════════════════════════════════════════════════════════════════
# # CI/CD Pipeline — PlateVision YOLOv8 Licence Plate Detection
# # ══════════════════════════════════════════════════════════════════════
# #
# # Triggered on:
# #   • Every push to main / develop
# #   • Every pull request targeting main
# #
# # Jobs:
# #   1. lint          flake8 style + isort import order
# #   2. test          pytest unit + integration (no GPU, no real model)
# #   3. build-docker  Build & push image to Docker Hub
# #   4. deploy-staging  SSH → pull & run on staging  (develop branch only)
# #   5. deploy-prod     SSH → pull & run on prod      (main branch only, manual approval gate)
# #
# # Required GitHub Secrets:
# #   DOCKERHUB_USERNAME   DOCKERHUB_TOKEN
# #   STAGING_HOST         STAGING_USER     STAGING_SSH_KEY
# #   PROD_HOST            PROD_USER        PROD_SSH_KEY
# # ══════════════════════════════════════════════════════════════════════

