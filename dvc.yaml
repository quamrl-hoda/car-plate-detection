stages:

  data_ingestion:
    cmd: python src/carPlateDetection/pipeline/stage_01_data_ingestion.py
    deps:
      - src/carPlateDetection/pipeline/stage_01_data_ingestion.py
      - src/carPlateDetection/components/data_ingestion.py
      - src/carPlateDetection/config/configuration.py
      - src/carPlateDetection/entity/config_entity.py
      - src/carPlateDetection/utils/common.py
      - config/config.yaml
    outs:
      - artifacts/data_ingestion/data.zip:
          cache: true
      - artifacts/data_ingestion/train:
          cache: false
      - artifacts/data_ingestion/valid:
          cache: false
      - artifacts/data_ingestion/test:
          cache: false
      - artifacts/data_ingestion/data.yaml:
          cache: false

  data_validation:
    cmd: python src/carPlateDetection/pipeline/stage_02_data_validation.py
    deps:
      - src/carPlateDetection/pipeline/stage_02_data_validation.py
      - src/carPlateDetection/components/data_validation.py
      - src/carPlateDetection/config/configuration.py
      - src/carPlateDetection/entity/config_entity.py
      - src/carPlateDetection/utils/common.py
      - config/config.yaml
      - artifacts/data_ingestion/train
      - artifacts/data_ingestion/valid
      - artifacts/data_ingestion/test
    outs:
      - artifacts/data_validation/status.txt:
          cache: false

  data_transformation:
    cmd: python src/carPlateDetection/pipeline/stage_03_data_transformation.py
    deps:
      - src/carPlateDetection/pipeline/stage_03_data_transformation.py
      - src/carPlateDetection/components/data_transformation.py
      - src/carPlateDetection/config/configuration.py
      - src/carPlateDetection/entity/config_entity.py
      - src/carPlateDetection/utils/common.py
      - config/config.yaml
      - params.yaml
      - artifacts/data_ingestion/train
      - artifacts/data_ingestion/valid
      - artifacts/data_ingestion/test
      - artifacts/data_ingestion/data.yaml
      - artifacts/data_validation/status.txt
    params:
      - params.yaml:
          - TrainingArguments.image_size
    outs:
      - artifacts/data_transformation:
          cache: true

  model_trainer:
    cmd: python src/carPlateDetection/pipeline/stage_04_model_trainer.py
    deps:
      - src/carPlateDetection/pipeline/stage_04_model_trainer.py
      - src/carPlateDetection/components/model_trainer.py
      - src/carPlateDetection/config/configuration.py
      - src/carPlateDetection/entity/config_entity.py
      - src/carPlateDetection/utils/common.py
      - config/config.yaml
      - params.yaml
      - artifacts/data_transformation
    params:
      - params.yaml:
          - TrainingArguments.epochs
          - TrainingArguments.image_size
          - TrainingArguments.batch_size
          - TrainingArguments.lr0
          - TrainingArguments.lrf
          - TrainingArguments.momentum
          - TrainingArguments.weight_decay
          - TrainingArguments.warmup_epochs
          - TrainingArguments.optimizer
          - TrainingArguments.seed
          - TrainingArguments.pretrained
          - TrainingArguments.augment
    outs:
      - artifacts/model_trainer/car_plate_detector/weights/best.pt:
          cache: true
      - artifacts/model_trainer/car_plate_detector/weights/last.pt:
          cache: true

  model_evaluation:
    cmd: python src/carPlateDetection/pipeline/stage_05_model_evaluation.py
    deps:
      - src/carPlateDetection/pipeline/stage_05_model_evaluation.py
      - src/carPlateDetection/components/model_evaluation.py
      - src/carPlateDetection/config/configuration.py
      - src/carPlateDetection/entity/config_entity.py
      - src/carPlateDetection/utils/common.py
      - config/config.yaml
      - params.yaml
      - artifacts/model_trainer/car_plate_detector/weights/best.pt
      - artifacts/data_transformation
    params:
      - params.yaml:
          - TrainingArguments.image_size
          - TrainingArguments.conf_threshold
          - TrainingArguments.iou_threshold
    metrics:
      - artifacts/model_evaluation/metrics.json:
          cache: false
